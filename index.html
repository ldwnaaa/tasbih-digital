<html>
   <head>
      <title>Tasbih Digital</title>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%);
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
          align-items: center;
          padding: 30px 20px 20px;
        }

        .header {
          text-align: center;
          margin-bottom: 30px;
          animation: slideDown 0.8s ease-out;
          width: 100%;
          max-width: 600px;
        }

        .header h2 {
          font-size: 2.5em;
          color: #8b6f47;
          text-shadow: 2px 2px 4px rgba(139, 111, 71, 0.1);
          font-weight: 700;
          letter-spacing: 2px;
        }

        .content {
          background: linear-gradient(to bottom, #fffaf0, #f5e6d3);
          border-radius: 30px;
          padding: 40px;
          box-shadow: 0 20px 60px rgba(139, 111, 71, 0.15);
          text-align: center;
          max-width: 400px;
          border: 3px solid #e8d5c4;
          animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .text {
          font-size: 2.2em;
          color: #a0826d;
          margin-bottom: 30px;
          font-weight: 600;
          letter-spacing: 1px;
          animation: fadeIn 0.8s ease-in;
        }

        .number {
          font-size: 5em;
          font-weight: 800;
          color: #d4a574;
          margin-bottom: 30px;
          text-shadow: 3px 3px 8px rgba(139, 111, 71, 0.1);
          animation: scaleIn 0.6s ease-out;
          font-family: 'Arial', sans-serif;
        }

        button {
          background: linear-gradient(135deg, #d4a574 0%, #c99454 100%);
          color: white;
          border: none;
          padding: 18px 50px;
          font-size: 1.3em;
          border-radius: 50px;
          cursor: pointer;
          font-weight: 700;
          letter-spacing: 1px;
          box-shadow: 0 10px 25px rgba(212, 165, 116, 0.3);
          transition: all 0.3s ease;
          text-transform: uppercase;
          position: relative;
          overflow: hidden;
        }

        button::before {
          content: '';
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: rgba(255, 255, 255, 0.2);
          transition: 0.5s;
        }

        button::before:hover {
          left: 100%;
        }

        button:hover {
          transform: translateY(-3px);
          box-shadow: 0 15px 35px rgba(212, 165, 116, 0.4);
        }

        button:active {
          transform: translateY(-1px);
          box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3);
        }

        button.animate-press {
          animation: pressShake 0.26s ease-in-out;
        }

        .number.animate-number {
          animation: pulseNumber 0.26s ease-in-out;
        }

        @keyframes pressShake {
          0% { transform: translateY(0); }
          25% { transform: translateY(-5px) rotate(-2deg); }
          50% { transform: translateY(2px) rotate(2deg); }
          75% { transform: translateY(-3px) rotate(-1deg); }
          100% { transform: translateY(0) rotate(0); }
        }

        @keyframes pulseNumber {
          0% { transform: scale(1); }
          40% { transform: scale(1.08); }
          100% { transform: scale(1); }
        }

        @keyframes slideDown {
          from {
            opacity: 0;
            transform: translateY(-30px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes popIn {
          0% {
            opacity: 0;
            transform: scale(0.7);
          }
          100% {
            opacity: 1;
            transform: scale(1);
          }
        }

        @keyframes fadeIn {
          from {
            opacity: 0;
          }
          to {
            opacity: 1;
          }
        }

        @keyframes scaleIn {
          from {
            opacity: 0;
            transform: scale(0);
          }
          to {
            opacity: 1;
            transform: scale(1);
          }
        }

        @media (max-width: 600px) {
          .header h2 {
            font-size: 2em;
          }

          .content {
            padding: 30px 20px;
            border-radius: 20px;
          }

          .text {
            font-size: 1.8em;
            margin-bottom: 20px;
          }

          .number {
            font-size: 3.5em;
            margin-bottom: 20px;
          }

          button {
            padding: 15px 40px;
            font-size: 1.1em;
          }
        }
      </style>
   </head> 
   <body>
    <div class="header">
        <h2>Tasbih Digital</h2>
    </div>
    <div class="content">
        <div class="text" id="text">Subhanallah</div>
        <div class="number" id="number">0</div>
        <button onclick="tekan()">Klik</button>
     </div>
   </body>
   <script>
    let angka= 0;
    let tipe = 1;
    function tekan() {
        const button = document.querySelector('button');
        const numberEl = document.getElementById('number');
        button.classList.add('animate-press');
        numberEl.classList.add('animate-number');
        setTimeout(() => {
          button.classList.remove('animate-press');
          numberEl.classList.remove('animate-number');
        }, 260);

        angka = angka + 1;

        if (angka === 33) {
            angka = 0;

            tipe = tipe + 1;
            if (tipe === 4) {
                tipe = 1;
            }
        }

        document.getElementById('number').innerHTML = angka;
        if (tipe === 1) {
            document.getElementById('text').innerHTML = 'Subhanallah'
        }
        else if (tipe === 2) {
            document.getElementById('text').innerHTML = 'Alhamdulillah'
        }
        else if (tipe === 3) {
            document.getElementById('text').innerHTML = 'Allahuakbar'
        }
    }
   </script>
</html>
